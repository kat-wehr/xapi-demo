
<style>
.scene-tab { cursor: pointer; padding: 6px 14px; border-radius: 6px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); color: var(--color-text-secondary); background: transparent; transition: all .15s; }
.scene-tab.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); font-weight: 500; }
.insight-card { border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); padding: 1rem 1.25rem; margin-top: 1rem; }
.insight-flag { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 4px; margin-bottom: 8px; }
.flag-warn { background: var(--color-background-warning); color: var(--color-text-warning); }
.flag-danger { background: var(--color-background-danger); color: var(--color-text-danger); }
.flag-ok { background: var(--color-background-success); color: var(--color-text-success); }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-label { font-size: 13px; color: var(--color-text-secondary); width: 90px; flex-shrink: 0; text-align: right; }
.bar-track { flex: 1; height: 24px; background: var(--color-background-secondary); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 8px; font-size: 12px; font-weight: 500; transition: width .4s ease; }
.bar-correct { background: #1D9E75; color: #E1F5EE; }
.bar-partial  { background: #BA7517; color: #FAEEDA; }
.bar-incorrect { background: #A32D2D; color: #FCEBEB; }
.metric-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1rem; }
.metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; }
.metric-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.metric-lbl { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
</style>

<div style="padding: 1rem 0 0;">

<div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:1.25rem;" id="tabs">
  <button class="scene-tab active" onclick="show(0)">Scene 1 — O₂ decision</button>
  <button class="scene-tab" onclick="show(1)">Scene 2 — bronchodilator</button>
  <button class="scene-tab" onclick="show(2)">Scene 3 — escalation</button>
  <button class="scene-tab" onclick="show(3)">Scene 4 — communication</button>
</div>

<div id="panel"></div>

<div style="margin-top:1.5rem; border-top: 0.5px solid var(--color-border-tertiary); padding-top:1rem;">
  <p style="font-size:13px; color:var(--color-text-secondary); margin:0;">Cohort: 30 learners · First attempt only · xAPI distractor data, Pediatric Triage Scenario</p>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const scenes = [
  {
    title: 'Scene 1 — initial O₂ decision',
    comp: 'COMP-NUR-301',
    correct: { label: 'B — O₂ immediately, then assess', n: 14 },
    partial:  { label: 'A — History first', n: 10 },
    incorrect:{ label: 'C — Wait for physician orders', n: 6 },
    flag: 'warn',
    flagLabel: 'Pattern flagged',
    insight: '16 of 30 learners did not prioritise oxygenation before assessment or escalation. The 6 learners choosing C reveal a scope-of-practice gap — they believe a physician order is required for supplemental O₂. This is a discrete, teachable misconception that a targeted remediation prompt can address before learners retry.',
    action: 'Recommended action: Insert a brief scope-of-practice callout before Scene 1 for learners who chose C. Flag COMP-NUR-301 for review in next curriculum sprint.'
  },
  {
    title: 'Scene 2 — bronchodilator decision',
    comp: 'COMP-NUR-301',
    correct: { label: 'A — Prepare albuterol, notify MD', n: 19 },
    partial:  { label: 'B — Chest X-ray first', n: 8 },
    incorrect:{ label: 'C — Increase O₂ only', n: 3 },
    flag: 'ok',
    flagLabel: 'Performing well',
    insight: 'Most learners applied empirical treatment reasoning correctly. The 8 choosing B (imaging before treatment) show diagnostic caution that is clinically understandable but represents a sequencing gap — diagnosis before stabilisation. Only 3 conflated compensation with treatment, a strong result.',
    action: 'Recommended action: Reinforce empirical treatment reasoning in scene feedback. No major curriculum change needed; monitor across next cohort.'
  },
  {
    title: 'Scene 3 — deterioration escalation',
    comp: 'COMP-NUR-302',
    correct: { label: 'A — NRB mask + IV magnesium', n: 11 },
    partial:  { label: 'C — Prep intubation', n: 13 },
    incorrect:{ label: 'B — Continue and monitor', n: 6 },
    flag: 'danger',
    flagLabel: 'Critical gap identified',
    insight: '19 of 30 learners did not select the evidence-based escalation step. 13 jumped directly to intubation preparation — skipping the magnesium sulfate and NRB steps that should come first. This is a systematic pattern, not individual error, and suggests the escalation ladder for severe paediatric asthma is not well internalised across the cohort.',
    action: 'Recommended action: Add a dedicated microlearning module on the paediatric asthma escalation ladder before this scenario is deployed at scale. COMP-NUR-302 requires targeted instructional attention.'
  },
  {
    title: 'Scene 4 — family communication',
    comp: 'COMP-NUR-304',
    correct: { label: 'A — Brief, honest, calm update', n: 20 },
    partial:  { label: 'B — Full clinical briefing', n: 7 },
    incorrect:{ label: 'C — False reassurance', n: 3 },
    flag: 'ok',
    flagLabel: 'Performing well',
    insight: 'Communication under pressure is a strong suit for this cohort. The 7 choosing B over-index on information delivery — a right instinct with poor timing awareness. The 3 choosing false reassurance are worth watching; this pattern in clinical settings erodes patient trust.',
    action: 'Recommended action: Strengthen time-pressure framing in Scene 4 setup copy. Consider a follow-up scenario focused on delivering difficult news with limited time.'
  }
];

let chartInst = null;

function show(i) {
  document.querySelectorAll('.scene-tab').forEach((t,j) => t.classList.toggle('active', i===j));
  const s = scenes[i];
  const total = s.correct.n + s.partial.n + s.incorrect.n;
  const pct = n => Math.round(n/total*100);

  document.getElementById('panel').innerHTML = `
    <div class="metric-grid">
      <div class="metric">
        <div class="metric-val" style="color:#1D9E75">${s.correct.n}</div>
        <div class="metric-lbl">Correct (${pct(s.correct.n)}%)</div>
      </div>
      <div class="metric">
        <div class="metric-val" style="color:#BA7517">${s.partial.n}</div>
        <div class="metric-lbl">Partial (${pct(s.partial.n)}%)</div>
      </div>
      <div class="metric">
        <div class="metric-val" style="color:#A32D2D">${s.incorrect.n}</div>
        <div class="metric-lbl">Incorrect (${pct(s.incorrect.n)}%)</div>
      </div>
    </div>

    <div class="bar-row"><div class="bar-label">Correct</div><div class="bar-track"><div class="bar-fill bar-correct" style="width:${pct(s.correct.n)}%">${s.correct.label}</div></div></div>
    <div class="bar-row"><div class="bar-label">Partial</div><div class="bar-track"><div class="bar-fill bar-partial" style="width:${pct(s.partial.n)}%">${s.partial.label}</div></div></div>
    <div class="bar-row"><div class="bar-label">Incorrect</div><div class="bar-track"><div class="bar-fill bar-incorrect" style="width:${pct(s.incorrect.n)}%">${s.incorrect.label}</div></div></div>

    <div class="insight-card">
      <span class="insight-flag flag-${s.flag}">${s.flagLabel} · ${s.comp}</span>
      <p style="font-size:13px; color:var(--color-text-secondary); margin:0 0 10px; line-height:1.6;">${s.insight}</p>
      <p style="font-size:13px; color:var(--color-text-primary); margin:0; font-weight:500; line-height:1.5;">${s.action}</p>
    </div>
  `;
}

show(0);
</script>
